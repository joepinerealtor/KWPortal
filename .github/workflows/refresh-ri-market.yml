name: Refresh RI Market Data

on:
  schedule:
    - cron: "23 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-ri-market
  cancel-in-progress: true

jobs:
  refresh-ri-market:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Refresh RI market data feed
        shell: pwsh
        run: .\scripts\update-ri-market.ps1 -RepositoryRoot $PWD.Path

      - name: Commit refreshed RI market data when needed
        shell: pwsh
        run: |
          git add data/ri-market.json

          if (git diff --cached --quiet) {
            Write-Host "No RI market data changes detected."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Refresh RI market data [skip ci]"
          git push
